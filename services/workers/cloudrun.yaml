apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: whatif-workers
spec:
  template:
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/whatif/workers:latest
          ports:
            - containerPort: 8090
          env:
            - name: GEMINI_API_KEY
              value: your-gemini-api-key
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            - name: WHATIF_ASSET_BUCKET
              value: your-asset-bucket
            - name: WHATIF_IMAGE_MODEL
              value: gemini-3.1-flash-image-preview
            - name: WHATIF_VIDEO_MODEL
              value: veo-3.1-fast-generate-preview
